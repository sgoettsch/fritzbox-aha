name: PHPStan

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - 'renovate/**'

jobs:
  phpstan:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/sgoettsch/docker-phpstan:latest-php8.1@sha256:92482b6d077b8d2b6df66535d07a00617972b15b353f0917c523506909a311ed
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Composer
        run: composer install

      - name: PHPStan
        uses: docker://ghcr.io/sgoettsch/docker-phpstan:latest-php8.1@sha256:92482b6d077b8d2b6df66535d07a00617972b15b353f0917c523506909a311ed
        with:
          args: analyze --error-format=table /github/workspace
