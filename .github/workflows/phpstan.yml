name: PHPStan

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - 'renovate/**'

jobs:
  phpstan:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/sgoettsch/docker-phpstan:latest-php8.1@sha256:2f841d90379e580b57ecc14aeb73cfa8b5ecc23744d96519b3ac7f7b178db720
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Composer
        run: composer install

      - name: PHPStan
        uses: docker://ghcr.io/sgoettsch/docker-phpstan:latest-php8.1@sha256:2f841d90379e580b57ecc14aeb73cfa8b5ecc23744d96519b3ac7f7b178db720
        with:
          args: analyze --error-format=table /github/workspace
