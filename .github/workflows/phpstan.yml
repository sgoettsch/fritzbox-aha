name: PHPStan

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - 'renovate/**'

jobs:
  phpstan:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/sgoettsch/docker-phpstan:latest-php8.1@sha256:ada1dad6597726d30fe8d54f597a8f8542693b9c0c15125271981449432ffe05
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Composer
        run: composer install

      - name: PHPStan
        uses: docker://ghcr.io/sgoettsch/docker-phpstan:latest-php8.1@sha256:ada1dad6597726d30fe8d54f597a8f8542693b9c0c15125271981449432ffe05
        with:
          args: analyze --error-format=table /github/workspace
